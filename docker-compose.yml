name: knowfoundry-rag-console

services:
  mysql:
    image: mysql:8.4
    container_name: knowfoundry-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: subjects_kg
    ports:
      - "3306:3306"
    volumes:
      - knowfoundry-mysql-data:/var/lib/mysql
    networks:
      - knowfoundry-rag-console
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 20

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: knowfoundry-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - knowfoundry-etcd-data:/etcd
    networks:
      - knowfoundry-rag-console

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: knowfoundry-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - knowfoundry-minio-data:/minio_data
    networks:
      - knowfoundry-rag-console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20

  milvus:
    image: milvusdb/milvus:v2.5.15
    container_name: knowfoundry-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
      MINIO_REGION: us-east-1
    volumes:
      - knowfoundry-milvus-data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    networks:
      - knowfoundry-rag-console
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3

  api:
    build: .
    container_name: knowfoundry-api
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.compose}
    ports:
      - "${API_BIND_HOST:-127.0.0.1}:${API_PORT:-8000}:8000"
    volumes:
      - ./models:/app/models:ro
      - ./scenarios:/app/scenarios
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./static:/app/static:ro
    networks:
      - knowfoundry-rag-console
    depends_on:
      mysql:
        condition: service_healthy
      milvus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5

networks:
  knowfoundry-rag-console:
    name: knowfoundry-rag-console

volumes:
  knowfoundry-mysql-data:
    name: knowfoundry-mysql-data
  knowfoundry-etcd-data:
    name: knowfoundry-etcd-data
  knowfoundry-minio-data:
    name: knowfoundry-minio-data
  knowfoundry-milvus-data:
    name: knowfoundry-milvus-data
