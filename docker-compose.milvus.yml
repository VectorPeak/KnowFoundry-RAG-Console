services:
  edu-mysql:
    image: mysql:8.0
    container_name: edu-mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: subjects_kg
    ports:
      - "3307:3306"
    volumes:
      - edu-mysql-data:/var/lib/mysql
    networks:
      default:
        aliases:
          - ksb-mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 20s
      retries: 10

  edu-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: edu-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - edu-etcd-data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  edu-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: edu-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data
    volumes:
      - edu-minio-data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  edu-milvus:
    image: milvusdb/milvus:v2.5.15
    container_name: edu-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: edu-etcd:2379
      MINIO_ADDRESS: edu-minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - edu-milvus-data:/var/lib/milvus
    depends_on:
      edu-etcd:
        condition: service_healthy
      edu-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  edu-mysql-data:
  edu-etcd-data:
  edu-minio-data:
  edu-milvus-data:
