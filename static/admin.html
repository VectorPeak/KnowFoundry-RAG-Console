<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KnowForge 状态页</title>
  <link href="/static/css/fontawesome-shim.css?v=1" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/admin.css" />
</head>
<body class="admin-page-body">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"><i class="fas fa-chart-line"></i></span>
      <span class="brand-text">KnowForge 状态页</span>
    </div>
    <div class="topbar-actions">
      <a class="btn btn-ghost" href="/"><i class="fas fa-comments"></i><span>问答页</span></a>
      <button class="btn btn-primary" id="refreshBtn"><i class="fas fa-rotate-right"></i><span>刷新</span></button>
    </div>
  </header>

  <main class="page">
    <div class="toolbar">
      <div class="toolbar-line">
        <div class="toolbar-left">
          <select id="scenarioSelect" class="scenario-select" aria-label="业务场景"></select>
          <input id="adminTokenInput" class="scenario-select" type="password" placeholder="管理令牌，可选" aria-label="管理令牌" />
        </div>
        <div class="updated-at" id="updatedAt">等待加载</div>
      </div>
    </div>

    <div id="adminBanner" class="admin-banner" style="display:none;"></div>

    <section class="metric-grid">
      <div class="metric-card">
        <div class="metric-head"><span>LangSmith</span><i class="fas fa-diagram-project"></i></div>
        <div class="metric-value" id="langsmithEnabledValue">-</div>
        <div class="metric-foot" id="langsmithProjectValue">-</div>
      </div>
      <div class="metric-card">
        <div class="metric-head"><span>当前场景</span><i class="fas fa-layer-group"></i></div>
        <div class="metric-value" id="scenarioValue">-</div>
        <div class="metric-foot" id="scenarioCountValue">-</div>
      </div>
      <div class="metric-card">
        <div class="metric-head"><span>知识库版本</span><i class="fas fa-code-branch"></i></div>
        <div class="metric-value mono" id="kbValue">-</div>
        <div class="metric-foot" id="versionSource">-</div>
      </div>
      <div class="metric-card">
        <div class="metric-head"><span>本地职责</span><i class="fas fa-shield-halved"></i></div>
        <div class="metric-value">RAG</div>
        <div class="metric-foot">业务链路、入库、回归验收</div>
      </div>
    </section>

    <div class="dashboard-grid">
      <div>
        <section class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title"><i class="fas fa-diagram-project"></i><span>LangSmith 企业观测</span></div>
              <div class="panel-subtitle">Trace、Annotation、Dataset 和 Evaluation 统一在 LangSmith 中完成</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="quality-list" id="langsmithStatus"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title"><i class="fas fa-database"></i><span>知识库版本</span></div>
              <div class="panel-subtitle">当前场景版本清单</div>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th style="width: 260px;">版本</th>
                  <th style="width: 90px;">状态</th>
                  <th style="width: 160px;">创建时间</th>
                  <th>说明</th>
                  <th style="width: 180px;">统计</th>
                </tr>
              </thead>
              <tbody id="versionRows"></tbody>
            </table>
          </div>
        </section>
      </div>

      <div>
        <section class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title"><i class="fas fa-file-circle-check"></i><span>入库质量报告</span></div>
              <div class="panel-subtitle">资料解析、切分、FAQ 冲突和 OCR 风险</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="quality-list" id="ingestionList"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title"><i class="fas fa-shield-halved"></i><span>回归报告</span></div>
              <div class="panel-subtitle">RAG 回归、性能和治理报告入口</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="quality-list" id="gateList"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title"><i class="fas fa-building-shield"></i><span>企业资料治理</span></div>
              <div class="panel-subtitle">真实度、增强包预检和资料治理证据</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="quality-list" id="enterpriseGovernanceList"></div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="/static/js/admin.js"></script>
</body>
</html>
