<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KnowForge RAG Platform</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <link rel="stylesheet" href="/static/css/app.css?v=20260522-layout2" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"><i class="fas fa-layer-group"></i></span>
        <span class="brand-text">KnowForge RAG Platform</span>
      </div>
      <div class="topbar-center">
        <select id="scenarioSelect" class="scenario-select" aria-label="业务场景"></select>
      </div>
      <div class="topbar-actions">
        <a class="btn btn-ghost" href="/admin"><i class="fas fa-chart-line"></i><span>状态页</span></a>
        <button class="btn btn-icon" id="newSessionBtn" title="新会话"><i class="fas fa-plus"></i></button>
      </div>
    </header>

    <main class="main-layout">
      <aside class="panel left-panel">
        <div class="panel-header">
          <div class="panel-title"><i class="fas fa-sliders-h"></i><span>当前上下文</span></div>
          <div class="scenario-summary" id="scenarioDescription">正在加载场景...</div>
        </div>
        <div class="panel-body">
          <div class="session-controls">
            <button class="btn btn-secondary btn-sm" id="sidebarNewSessionBtn"><i class="fas fa-plus"></i><span>新会话</span></button>
            <button class="btn btn-secondary btn-sm" id="clearHistoryBtn"><i class="fas fa-trash"></i><span>清空</span></button>
          </div>
          <div class="session-info" id="sessionInfo">会话初始化中...</div>
          <div class="field-grid">
            <div class="field">
              <label for="sourceFilter">业务分类</label>
              <select id="sourceFilter"><option value="">全部</option></select>
            </div>
            <div class="split-fields">
              <div class="field">
                <label for="tenantInput">租户</label>
                <input id="tenantInput" value="default" />
              </div>
              <div class="field">
                <label for="datasetInput">数据集</label>
                <input id="datasetInput" value="default" />
              </div>
            </div>
            <div class="split-fields">
              <div class="field">
                <label for="visibilitySelect">可见级别</label>
                <select id="visibilitySelect">
                  <option value="public">public</option>
                  <option value="internal">internal</option>
                  <option value="private">private</option>
                </select>
              </div>
              <div class="field">
                <label for="roleSelect">角色</label>
                <select id="roleSelect">
                  <option value="public">public</option>
                  <option value="internal">internal</option>
                  <option value="admin">admin</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <section class="panel chat-panel">
        <div class="chat-context">
          <div class="context-main">
            <div class="context-title" id="contextTitle">知识问答</div>
            <div class="context-subtitle" id="contextSubtitle">等待初始化</div>
          </div>
          <div class="context-tags">
            <span class="pill ok" id="connectionPill"><i class="fas fa-circle"></i><span>就绪</span></span>
            <span class="pill" id="kbPill"><i class="fas fa-code-branch"></i><span>版本 -</span></span>
          </div>
        </div>
        <div class="chat-history" id="chatHistory"></div>
        <div class="composer">
          <div class="composer-meta">
            <span id="composerScope" class="composer-scope">全部分类｜default/default｜public</span>
            <span class="composer-hint">Enter 发送，Shift + Enter 换行</span>
          </div>
          <div class="composer-box">
            <textarea id="chatInput" class="chat-input" rows="1" placeholder="输入问题..."></textarea>
            <button id="sendBtn" class="send-button" title="发送"><i class="fas fa-paper-plane"></i></button>
          </div>
        </div>
      </section>

      <aside class="panel right-panel">
        <div class="panel-header">
          <div class="panel-title"><i class="fas fa-compass"></i><span>辅助面板</span></div>
        </div>
        <div class="panel-body">
          <section class="side-section">
            <div class="side-section-title"><i class="fas fa-bolt"></i><span>快速入口</span></div>
            <div class="sample-list" id="sampleQuestions"></div>
          </section>
          <section class="side-section">
            <div class="side-section-title"><i class="fas fa-history"></i><span>会话历史</span></div>
            <div class="history-list" id="historyList"></div>
          </section>
          <section class="side-section">
            <div class="side-section-title"><i class="fas fa-chart-pie"></i><span>当前状态</span></div>
            <div id="sideStats" class="side-stats"></div>
          </section>
        </div>
      </aside>
    </main>
  </div>

  <script src="/static/js/state.js?v=20260522-layout2"></script>
  <script src="/static/js/utils.js?v=20260522-layout2"></script>
  <script src="/static/js/render.js?v=20260522-layout2"></script>
  <script src="/static/js/api.js?v=20260522-layout2"></script>
  <script src="/static/js/scenario.js?v=20260522-layout2"></script>
  <script src="/static/js/session.js?v=20260522-layout2"></script>
  <script src="/static/js/chat.js?v=20260522-layout2"></script>
  <script src="/static/js/app.js?v=20260522-layout2"></script>
</body>
</html>
